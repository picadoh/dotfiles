# quick ref:
#  - prefix + : -> command mode
#  - prefix + s -> session list
#  - prefix + c -> new window
#  - prefix + num -> select window
#  - ctrl + h/j/k/l -> navigate panes
#  - prefix + % -> split pane vertically
#  - prefix + " -> split pane horizontally
#  - prefix + d -> detach session
unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g prefix C-s
set -g mouse on
set -g status-position top
set -g status-style "bg=default"
set -g xterm-keys on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Ghostty-inspired Theme
# Colors (from ghostty-default-style-dark)
# bg: #151515, fg: #d1d1d1, blue: #51afef, green: #98be65, selection: #3d4455

set -g status-style "bg=default,fg=#d1d1d1"
set -g status-left-length 100
set -g status-right-length 100

# Left side: Session name
set -g status-left "#[fg=#000000,bg=#51afef,bold] #S #[fg=#51afef,bg=default] "

# Windows
set -g window-status-format "#[fg=#abb2bf,bg=default] #I #W "
set -g window-status-current-format "#[fg=#51afef,bg=default,bold]#[fg=#000000,bg=#51afef] #I #W #[fg=#51afef,bg=default]"

# Right side: Path and time
set -g status-right "#[fg=#3d4455,bg=default]#[fg=#d1d1d1,bg=#3d4455] #{pane_current_path} #[fg=#98be65,bg=default]#[fg=#000000,bg=#98be65,bold] %H:%M "


# Panes
set -g pane-border-style "fg=#3d4455"
set -g pane-active-border-style "fg=#51afef"

# Message
set -g message-style "bg=#3d4455,fg=#d1d1d1"

# Bindings
bind x kill-pane
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind C-a send C-a

# Keep at the bottom
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
run '~/.tmux/plugins/tpm/tpm'
